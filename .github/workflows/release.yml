on:
  push:
    tags:
      - 'v*'

name: Release

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build release assets
        env:
          CI: true
        run: |
          npm ci
          npm run build
          cp dist/sv.zip dist/SbmlViewer-offline-${{ github.ref_name }}.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: false
          files: |
            dist/SbmlViewer-offline-${{ github.ref_name }}.zip
