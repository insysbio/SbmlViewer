on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

name: Deploy to Azure Static Web Apps

permissions:
  contents: read

concurrency:
  group: azure-static-web-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Jekyll
        working-directory: site
        run: |
          bundle install
          bundle exec jekyll build \
            --destination ../_site

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build SV app
        env:
          CI: true
        run: |
          npm ci
          npm run build
          mkdir -p _site/online
          cp -rf dist/sv/* _site/online
          cp -rf src/assets/js/* _site/online/static/js # temp solution

      - name: Copy Azure config
        run: |
          cp site/staticwebapp.config.json _site/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_TOKEN }}
          app_location: _site
          skip_app_build: true
          action: "upload"
